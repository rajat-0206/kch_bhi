<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saloni — Welcome to Noida</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>✈️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5c842;
      --cream: #fff8ec;
      --deep: #0e0b1a;
      --pink: #ff6b9d;
      --sky: #4fc3f7;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep);
      font-family: 'DM Sans', sans-serif;
      cursor: default;
    }

    /* ── NIGHT SKY ── */
    #sky {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #1a1240 0%, #0e0b1a 60%);
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--min, 0.2); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* ── SPOTLIGHT ── */
    #spotlight {
      position: fixed;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: conic-gradient(from 160deg at 50% 0%, transparent 20%, rgba(255,220,100,0.12) 30%, rgba(255,220,100,0.18) 50%, rgba(255,220,100,0.12) 70%, transparent 80%);
      pointer-events: none; z-index: 1;
      animation: spotSway 8s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes spotSway {
      0%,100% { transform: translateX(-60%) rotate(-5deg); }
      50% { transform: translateX(-40%) rotate(5deg); }
    }

    /* ── CITYSCAPE SVG ── */
    #city {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      opacity: 0;
    }

    /* ── MAIN CONTENT ── */
    #stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
    }

    #badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(245,200,66,0.4);
      padding: 7px 20px;
      border-radius: 100px;
      opacity: 0;
      transform: translateY(20px);
      margin-bottom: 24px;
      background: rgba(245,200,66,0.06);
    }

    #name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 180px);
      color: white;
      line-height: 0.9;
      letter-spacing: 6px;
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      text-align: center;
      position: relative;
    }
    #name .letter {
      display: inline-block;
      background: linear-gradient(180deg, #ffffff 40%, rgba(255,255,255,0.4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(16px, 3vw, 26px);
      color: #ffe8b0;
      text-shadow: 0 1px 12px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.6);
      margin-top: 18px;
      opacity: 0;
      transform: translateY(20px);
      text-align: center;
    }

    #city-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 7vw, 72px);
      letter-spacing: 14px;
      color: var(--gold);
      margin-top: 10px;
      opacity: 0;
      transform: translateY(20px);
    }

    #sub {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #d8b4fe;
      background: rgba(109, 40, 217, 0.35);
      border: 1px solid rgba(167, 139, 250, 0.45);
      backdrop-filter: blur(8px);
      padding: 8px 22px;
      border-radius: 100px;
      white-space: nowrap;
      z-index: 25;
      opacity: 0;
    }

    /* ── CONFETTI ── */
    .confetti {
      position: fixed;
      width: 8px; height: 12px;
      top: -20px;
      border-radius: 2px;
      opacity: 0;
      z-index: 20;
      pointer-events: none;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) translateX(0); }
      100% { opacity: 0.3; transform: translateY(110vh) rotate(720deg) translateX(var(--drift, 40px)); }
    }

    /* ── FIREWORK ── */
    .firework {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 15;
    }

    /* ── WINDOW LIGHTS on city ── */
    .win {
      animation: blink var(--wb, 4s) ease-in-out infinite var(--wd, 0s);
    }
    @keyframes blink {
      0%,48%,52%,100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    /* ── AIRPLANE ── */
    #plane {
      position: fixed;
      top: 12%;
      left: -120px;
      font-size: 32px;
      z-index: 18;
      white-space: nowrap;
      display: flex; align-items: center; gap: 0;
      opacity: 0;
    }
    #plane-banner {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      padding: 5px 14px;
      border-radius: 4px;
      margin-left: 8px;
      white-space: nowrap;
    }

    /* ── MOON ── */
    #moon {
      position: fixed;
      top: 60px; right: 10%;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8dc, #f5c842);
      box-shadow: 0 0 30px rgba(245,200,66,0.4), 0 0 80px rgba(245,200,66,0.15);
      z-index: 3;
      opacity: 0;
    }

    /* ── BUTTON ── */
    #replay-btn {
      position: fixed;
      bottom: 28px; right: 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 9px 18px;
      border-radius: 100px;
      cursor: pointer;
      z-index: 30;
      transition: all 0.2s;
      opacity: 0;
    }
    #replay-btn:hover {
      background: rgba(255,255,255,0.14);
      color: white;
    }
  </style>
</head>

<!-- Airplane -->
<div id="plane">
  <span>✈</span>
  <div id="plane-banner">✦ WELCOME SALONI ✦</div>
</div>

<!-- Main stage -->
<div id="stage">
  <div id="badge">Noida's newest arrival</div>
  <div id="name">
    <span class="letter">S</span><span class="letter">A</span><span class="letter">L</span><span class="letter">O</span><span class="letter">N</span><span class="letter">I</span>
  </div>
  <div id="city-label">NOIDA</div>
  <div id="tagline">The city that waited, just for you.</div>
</div>

<div id="sub">April 2026 &nbsp;·&nbsp; Sector 62 &nbsp;·&nbsp; ∞ adventures ahead</div>

<button id="replay-btn">↺ Again</button>

<canvas id="fireworks" style="position:fixed;inset:0;z-index:16;pointer-events:none;width:100%;height:100%;"></canvas>

<script>
const $ = id => document.getElementById(id);
const body = document.body;

function rand(a,b){ return Math.random()*(b-a)+a; }
function lerp(a,b,t){ return a+(b-a)*t; }

// ── STARS ──
const sky = $('sky');
for(let i=0;i<160;i++){
  const s = document.createElement('div');
  s.className='star';
  const sz = rand(0.8,2.5);
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${rand(0,100)}%;top:${rand(0,70)}%;--d:${rand(2,6)}s;--delay:${rand(0,5)}s;--min:${rand(0.1,0.5)}`;
  sky.appendChild(s);
}

// ── ANIMATION TIMELINE ──
function animate(el, props, delay, duration, easing){
  return new Promise(res => {
    setTimeout(()=>{
      el.style.transition=`all ${duration}ms ${easing||'cubic-bezier(0.22,1,0.36,1)'}`;
      Object.assign(el.style, props);
      setTimeout(res, duration);
    }, delay);
  });
}

function sequence(){
  const moon=$('moon'), city=$('city'), spotlight=$('spotlight');
  const badge=$('badge'), name=$('name'), cityLabel=$('city-label');
  const tagline=$('tagline'), sub=$('sub'), plane=$('plane');
  const btn=$('replay-btn');

  // Reset
  [moon,city,spotlight,badge,name,cityLabel,tagline,plane,btn].forEach(el=>{
    if(!el) return;
    el.style.transition='none';
    el.style.opacity='0';
    el.style.transform='';
  });
  sub.style.transition='none';
  sub.style.opacity='0';
  name.style.transform='translateY(40px) scale(0.95)';
  badge.style.transform='translateY(20px)';
  cityLabel.style.transform='translateY(20px)';
  tagline.style.transform='translateY(20px)';

  // 1. Moon rises
  setTimeout(()=>{
    moon.style.transition='all 1800ms cubic-bezier(0.22,1,0.36,1)';
    moon.style.opacity='1';
  }, 300);

  // 2. City rises
  setTimeout(()=>{
    city.style.transition='all 2000ms cubic-bezier(0.22,1,0.36,1)';
    city.style.opacity='1';
  }, 600);

  // 3. Spotlight
  setTimeout(()=>{
    spotlight.style.transition='opacity 1500ms ease';
    spotlight.style.opacity='1';
  }, 1200);

  // 4. Badge
  setTimeout(()=>{
    badge.style.transition='all 800ms cubic-bezier(0.22,1,0.36,1)';
    badge.style.opacity='1';
    badge.style.transform='translateY(0)';
  }, 1800);

  // 5. Name letters stagger
  const letters=[...name.querySelectorAll('.letter')];
  letters.forEach((l,i)=>{
    l.style.opacity='0';
    l.style.transform='translateY(60px) scale(0.8)';
    setTimeout(()=>{
      l.style.transition=`all 700ms cubic-bezier(0.22,1,0.36,1)`;
      l.style.opacity='1';
      l.style.transform='translateY(0) scale(1)';
    }, 2200 + i*90);
  });
  setTimeout(()=>{
    name.style.opacity='1';
  },2200);

  // 6. City label
  setTimeout(()=>{
    cityLabel.style.transition='all 900ms cubic-bezier(0.22,1,0.36,1)';
    cityLabel.style.opacity='1';
    cityLabel.style.transform='translateY(0)';
  }, 2900);

  // 7. Tagline
  setTimeout(()=>{
    tagline.style.transition='all 900ms cubic-bezier(0.22,1,0.36,1)';
    tagline.style.opacity='1';
    tagline.style.transform='translateY(0)';
  }, 3300);

  // 8. Sub
  setTimeout(()=>{
    sub.style.transition='all 900ms ease';
    sub.style.opacity='1';
  }, 3800);

  // 9. Airplane flies across
  setTimeout(()=>{
    plane.style.transition='opacity 400ms ease';
    plane.style.opacity='1';
    plane.style.animation='flyAcross 9s linear forwards';
  }, 1500);

  // 10. Confetti burst
  setTimeout(()=>{ confettiBurst(); }, 2400);

  // 11. Fireworks
  setTimeout(()=>{ fireFireworks(); }, 2600);
  setTimeout(()=>{ fireFireworks(); }, 4200);
  setTimeout(()=>{ fireFireworks(); }, 5800);

  // 12. Replay button
  setTimeout(()=>{
    btn.style.transition='all 600ms ease';
    btn.style.opacity='1';
  }, 5000);
}

// ── CONFETTI ──
const colors = ['#f5c842','#ff6b9d','#4fc3f7','#a78bfa','#34d399','#fb923c','#fff'];
function confettiBurst(){
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const x=rand(20,80);
    const drift=rand(-120,120);
    const dur=rand(1800,3500);
    const delay=rand(0,800);
    const size=rand(6,12);
    const isCircle=Math.random()>0.6;
    c.style.cssText=`
      left:${x}%;top:-${rand(5,20)}px;
      background:${color};
      width:${size}px;height:${isCircle?size:rand(8,14)}px;
      border-radius:${isCircle?'50%':'2px'};
      --drift:${drift}px;
      animation:fall ${dur}ms ${rand(0,0.8)}s cubic-bezier(0.25,1,0.5,1) forwards;
    `;
    body.appendChild(c);
    setTimeout(()=>c.remove(), dur+1200);
  }
}

// ── FIREWORKS on canvas ──
const canvas=$('fireworks');
const ctx=canvas.getContext('2d');
function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

let particles=[];
function createFirework(x,y){
  const count=rand(40,70)|0;
  const baseColor=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=rand(1.5,6);
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      decay:rand(0.012,0.025),
      size:rand(2,5),
      color:baseColor,
      trail:[],
    });
  }
}
function fireFireworks(){
  const positions=[
    [rand(0.15,0.35), rand(0.15,0.45)],
    [rand(0.6,0.85), rand(0.1,0.4)],
    [rand(0.4,0.65), rand(0.05,0.35)],
  ];
  positions.forEach(([rx,ry],i)=>{
    setTimeout(()=>{
      createFirework(canvas.width*rx, canvas.height*ry);
    }, i*280);
  });
}
let animFrame;
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.05; // gravity
    p.vx*=0.98;
    p.life-=p.decay;
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  animFrame=requestAnimationFrame(loop);
}
loop();

// ── AIRPLANE CSS ──
const styleEl=document.createElement('style');
styleEl.textContent=`
  @keyframes flyAcross {
    from { left: -200px; }
    to { left: 110%; }
  }
  #plane { animation-fill-mode: forwards; }
`;
document.head.appendChild(styleEl);

// ── REPLAY ──
$('replay-btn').addEventListener('click',()=>{
  particles=[];
  sequence();
});

// ── START ──
sequence();

// ── CLICK BURST ──
document.addEventListener('click', e=>{
  if(e.target.id==='replay-btn') return;
  createFirework(e.clientX, e.clientY);
  confettiBurst();
});
</script>
